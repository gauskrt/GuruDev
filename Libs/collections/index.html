<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title id="pageTitle">Collection — GuruDev</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;0,700;1,300;1,400;1,600&family=Syne:wght@400;700;800&family=DM+Mono:ital,wght@0,300;0,400;1,300&family=Kaushan+Script&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { font-size: 18px; scroll-behavior: smooth; }
    body { overflow-x: hidden; background: #f8f3ed; color: #2e2622; font-family: 'Cormorant Garamond', Georgia, serif; }
    img  { display: block; max-width: 100%; }
    a    { text-decoration: none; color: inherit; }

    :root {
      --signal: #e05a2b;
      --bone:   #2e2622;
      --fog:    #796b62;
      --ash:    #b8afa4;
      --ink:    #d9d0c4;
      --deep:   #ede7de;
      --cream:  #17110d;
      --brush:  'Kaushan Script', cursive;
      --sans:   'Syne', sans-serif;
      --mono:   'DM Mono', monospace;
      --serif:  'Cormorant Garamond', Georgia, serif;
      --g:      clamp(24px, 6vw, 100px);
    }

    /* ── NAV ── */
    .c-nav {
      position: sticky; top: 0;
      height: 60px;
      display: flex; align-items: center; justify-content: space-between;
      padding: 0 var(--g);
      background: rgba(248,243,237,0.95);
      border-bottom: 1px solid rgba(224,90,43,0.1);
      backdrop-filter: blur(14px);
      z-index: 100;
    }
    .c-nav-logo {
      font-family: var(--brush);
      font-size: 1.45rem;
      color: var(--cream);
      letter-spacing: 0.02em;
    }
    .c-nav-back {
      font-family: var(--mono);
      font-size: 0.6rem;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--fog);
      display: flex; align-items: center; gap: 0.5rem;
      transition: color 0.2s;
    }
    .c-nav-back:hover { color: var(--signal); }
    .c-nav-back svg { width: 14px; }

    /* ── YEAR NAV STRIP ── */
    .c-year-strip {
      display: flex; align-items: center;
      padding: 0 var(--g);
      height: 44px;
      background: var(--deep);
      border-bottom: 1px solid rgba(224,90,43,0.1);
      overflow-x: auto;
      scrollbar-width: none;
      gap: 0;
    }
    .c-year-strip::-webkit-scrollbar { display: none; }
    .c-yr {
      font-family: var(--mono);
      font-size: 0.66rem;
      letter-spacing: 0.16em;
      color: var(--fog);
      padding: 0 1.4rem;
      height: 44px;
      display: flex; align-items: center;
      border-right: 1px solid rgba(224,90,43,0.1);
      transition: color 0.2s, background 0.2s;
      white-space: nowrap;
      cursor: pointer;
      position: relative;
    }
    .c-yr::after {
      content: '';
      position: absolute; bottom: 0; left: 0; right: 0;
      height: 2px; background: var(--signal);
      transform: scaleX(0); transform-origin: left;
      transition: transform 0.25s cubic-bezier(0.22,1,0.36,1);
    }
    .c-yr:hover, .c-yr.active { color: var(--bone); }
    .c-yr.active::after, .c-yr:hover::after { transform: scaleX(1); }

    /* ── HERO ── */
    .c-hero {
      padding: clamp(60px,10vh,120px) var(--g) clamp(40px,6vh,80px);
      display: flex; align-items: flex-end; justify-content: space-between;
      flex-wrap: wrap; gap: 2rem;
      border-bottom: 1px solid rgba(224,90,43,0.1);
    }
    .c-hero-year {
      font-family: var(--sans);
      font-size: clamp(6rem, 20vw, 18rem);
      font-weight: 800;
      line-height: 0.85;
      letter-spacing: -0.04em;
      color: transparent;
      -webkit-text-stroke: 1.5px rgba(224,90,43,0.35);
      user-select: none;
    }
    .c-hero-meta {
      max-width: 360px;
      padding-bottom: 1rem;
    }
    .c-hero-label {
      font-family: var(--mono);
      font-size: 0.6rem;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      color: var(--signal);
      display: block;
      margin-bottom: 1rem;
      padding-bottom: 0.75rem;
      border-bottom: 1px solid rgba(224,90,43,0.2);
    }
    .c-hero-title {
      font-family: var(--serif);
      font-size: clamp(1.8rem, 4vw, 3rem);
      font-weight: 300;
      font-style: italic;
      line-height: 1.15;
      color: var(--cream);
      margin-bottom: 1rem;
    }
    .c-hero-desc {
      font-family: var(--serif);
      font-size: 1rem;
      font-style: italic;
      color: var(--fog);
      line-height: 1.9;
    }

    /* ── COLLECTION GRID ── */
    .c-grid-wrap {
      padding: clamp(40px,6vh,80px) var(--g);
    }
    .c-grid-header {
      display: flex; align-items: baseline; justify-content: space-between;
      margin-bottom: clamp(2rem,4vh,4rem);
      flex-wrap: wrap; gap: 1rem;
    }
    .c-grid-heading {
      font-family: var(--sans);
      font-size: clamp(1.6rem, 4vw, 3.5rem);
      font-weight: 800;
      line-height: 0.92;
      letter-spacing: -0.03em;
      color: var(--cream);
    }
    .c-count {
      font-family: var(--mono);
      font-size: 0.62rem;
      letter-spacing: 0.2em;
      color: var(--fog);
      text-transform: uppercase;
    }

    .c-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 8px;
    }
    @media (max-width: 700px) { .c-grid { grid-template-columns: repeat(2, 1fr); } }
    @media (max-width: 440px) { .c-grid { grid-template-columns: 1fr; } }

    .c-card {
      position: relative;
      aspect-ratio: 1;
      overflow: hidden;
      background: var(--ink);
      cursor: pointer;
    }
    .c-card img {
      width: 100%; height: 100%;
      object-fit: cover;
      transition: transform 0.7s cubic-bezier(0.4,0,0.2,1);
      display: block;
    }
    .c-card:hover img { transform: scale(1.06); }

    /* Placeholder hatch when no image */
    .c-card.ph img { display: none; }
    .c-card.ph::before {
      content: '';
      position: absolute; inset: 0;
      background: repeating-linear-gradient(-45deg, #d9d0c4, #d9d0c4 12px, #ede7de 12px, #ede7de 24px);
    }
    .c-card-ph-label {
      position: absolute; inset: 0;
      display: flex; align-items: center; justify-content: center;
      font-family: var(--mono); font-size: 0.6rem;
      color: rgba(224,90,43,0.4); text-align: center; padding: 1rem;
      display: none;
    }
    .c-card.ph .c-card-ph-label { display: flex; }

    .c-card-overlay {
      position: absolute; bottom: 0; left: 0; right: 0;
      padding: 1rem 1.2rem;
      background: linear-gradient(transparent, rgba(20,10,5,0.78));
      opacity: 0;
      transform: translateY(4px);
      transition: opacity 0.3s, transform 0.3s;
    }
    .c-card:hover .c-card-overlay { opacity: 1; transform: none; }
    .c-card-num  { font-family: var(--mono); font-size: 0.58rem; letter-spacing: 0.15em; color: rgba(255,200,170,0.8); display: block; margin-bottom: 0.2rem; }
    .c-card-name { font-family: var(--serif); font-size: 0.9rem; font-style: italic; color: #fff; }

    /* ── FOOTER ── */
    .c-footer {
      border-top: 1px solid rgba(224,90,43,0.12);
      background: var(--deep);
      padding: 2.5rem var(--g);
      display: flex; align-items: center; justify-content: space-between;
      flex-wrap: wrap; gap: 1rem;
    }
    .c-footer-logo { display: block; }
    .c-footer-logo-img { height: 44px; width: auto; display: block; }
    .c-footer-logo-ph {
      height: 44px; width: 130px;
      border: 2px dashed rgba(224,90,43,0.45);
      display: none; align-items: center; justify-content: center;
      font-family: var(--mono); font-size: 0.55rem;
      letter-spacing: 0.12em; text-transform: uppercase;
      color: rgba(224,90,43,0.6);
    }
    .c-footer-logo.logo-fallback .c-footer-logo-img { display: none; }
    .c-footer-logo.logo-fallback .c-footer-logo-ph  { display: flex; }
    .c-footer-copy { font-family: var(--mono); font-size: 0.58rem; letter-spacing: 0.14em; color: var(--fog); text-align: center; }

    /* ── LOGO ── */
    .c-nav-logo { display: flex; align-items: center; }
    .c-nav-logo-img { height: 36px; width: auto; display: block; }
    .c-nav-logo-ph {
      height: 36px; width: 100px;
      border: 2px dashed rgba(224,90,43,0.45);
      display: none; align-items: center; justify-content: center;
      font-family: var(--mono); font-size: 0.55rem;
      letter-spacing: 0.12em; text-transform: uppercase;
      color: rgba(224,90,43,0.6);
    }
    .c-nav-logo.logo-fallback .c-nav-logo-img { display: none; }
    .c-nav-logo.logo-fallback .c-nav-logo-ph  { display: flex; }

    /* ── DARK MODE TOGGLE ── */
    .c-dm-toggle {
      background: none; border: none; cursor: pointer;
      font-size: 1.1rem; color: var(--fog);
      transition: color 0.2s, transform 0.35s;
      padding: 0 0.2rem; line-height: 1;
    }
    .c-dm-toggle:hover { color: var(--signal); transform: rotate(180deg); }

    /* ── DARK MODE ── */
    [data-theme="dark"] {
      --void:  #0d0b09; --deep:  #161210; --ink:   #2a2520;
      --ash:   #5a5248; --fog:   #8a7f76; --bone:  #c8bfb5;
      --cream: #e8dfd5;
    }
    [data-theme="dark"] body { background: var(--void); color: var(--bone); }
    [data-theme="dark"] .c-nav { background: rgba(13,11,9,0.96); border-bottom-color: rgba(224,90,43,0.15); }
    [data-theme="dark"] .c-year-strip { background: var(--deep); }
    [data-theme="dark"] .c-hero { border-bottom-color: rgba(224,90,43,0.12); }
    [data-theme="dark"] .c-grid-wrap { background: var(--void); }
    [data-theme="dark"] .c-footer { background: var(--deep); }
  </style>
</head>
<body>

  <!-- NAV -->
  <header class="c-nav">
    <a href="../index.html" class="c-nav-logo" id="cNavLogo">
      <span style="font-family:'Kaushan Script',cursive;font-size:1.65rem;color:var(--cream);letter-spacing:0.02em;line-height:1;">GuruDev</span>
    </a>
    <div style="display:flex;align-items:center;gap:1.5rem;">
      <button class="c-dm-toggle" id="cDmToggle" aria-label="Toggle dark mode" title="Toggle dark mode">◐</button>
      <a href="../index.html" class="c-nav-back">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M19 12H5M12 5l-7 7 7 7"/></svg>
        Back to Portfolio
      </a>
    </div>
  </header>

  <!-- YEAR STRIP -->
  <div class="c-year-strip" id="yearStrip">
    <!-- Populated by JS -->
  </div>

  <!-- HERO -->
  <section class="c-hero">
    <div class="c-hero-year" id="heroYear">2023</div>
    <div class="c-hero-meta">
      <span class="c-hero-label" id="heroLabel">Collection · 2023</span>
      <h1 class="c-hero-title" id="heroTitle">Works from<br/>this season</h1>
      <!-- ↓ Optionally add a per-year description here via JS data below ↓ -->
      <p class="c-hero-desc" id="heroDesc">
        A selection of drawings, studies, and finished works created throughout the year.
      </p>
    </div>
  </section>

  <!-- COLLECTION GRID -->
  <section class="c-grid-wrap">
    <div class="c-grid-header">
      <h2 class="c-grid-heading" id="gridHeading">All Works</h2>
      <span class="c-count" id="gridCount"></span>
    </div>
    <div class="c-grid" id="collectionGrid">
      <!-- Populated by JS -->
    </div>
  </section>

  <!-- FOOTER -->
  <footer class="c-footer">
    <a href="../index.html" class="c-footer-logo">
      <span style="font-family:'Kaushan Script',cursive;font-size:2rem;color:var(--cream);letter-spacing:0.02em;line-height:1;">GuruDev</span>
    </a>
    <span class="c-footer-copy">© GuruDev. All art rights reserved.</span>
  </footer>

  <script>
    /* ═══════════════════════════════════════════════════════════
       COLLECTION PAGE — configuration

       HOW TO ADD IMAGES FOR A YEAR
       ─────────────────────────────────────────────────────────
       1. Drop your files into:
            images/Libs/projects/collections/YEAR/
          e.g.  images/Libs/projects/collections/2023/work-01.jpg

       2. Find the matching year in YEAR_DATA below and add
          entries to its  works  array:
            { src: '../images/Libs/projects/collections/2023/work-01.jpg',
              title: 'Session 01' }

       3. Add as many works as you like — the grid handles the rest.
          When works[] is empty, placeholder cards are shown instead.

       YEARS — add / remove entries in the YEARS array to control
       which years appear in the strip at the top of the page.
    ═══════════════════════════════════════════════════════════ */

    /* ── Dark mode — reads the same localStorage key as the main page ── */
    const savedTheme = localStorage.getItem('theme');
    if (savedTheme) document.documentElement.setAttribute('data-theme', savedTheme);
    const cDmToggle = document.getElementById('cDmToggle');
    cDmToggle?.addEventListener('click', () => {
      const next = document.documentElement.getAttribute('data-theme') === 'dark' ? 'light' : 'dark';
      document.documentElement.setAttribute('data-theme', next);
      localStorage.setItem('theme', next);
    });

    const YEARS = [2022, 2023, 2024, 2025];

    const YEAR_DATA = {
      2022: {
        title:  'Deep Space',
        desc:   'Cosmic geometries, dense ink, strange attractors on paper.',
        works:  [
          { src: '2022/Butterfly and Rat.jpg', title: 'Butterfly and Rat' },
          { src: '2022/Cuties.jpg',            title: 'Cuties' },
          { src: '2022/Dancer.jpg',            title: 'Dancer' },
          { src: '2022/Deseptive Croc.jpg',    title: 'Deceptive Croc' },
          { src: '2022/Drown.jpg',             title: 'Drown' },
          { src: '2022/Elegance.jpg',          title: 'Elegance' },
          { src: '2022/Justice.jpg',           title: 'Justice' },
          { src: '2022/Large.jpg',             title: 'Large' },
          { src: '2022/London.jpg',            title: 'London' },
          { src: '2022/Monkey-king.jpg',       title: 'Monkey King' },
          { src: '2022/Pengu Fighter.jpg',     title: 'Pengu Fighter' },
          { src: '2022/Perspective.jpg',       title: 'Perspective' },
          { src: '2022/Predators.jpg',         title: 'Predators' },
          { src: '2022/Sea-Horse.jpg',         title: 'Sea Horse' },
          { src: '2022/Shedding.jpg',          title: 'Shedding' },
          { src: '2022/split.jpg',             title: 'Split' },
          { src: '2022/Tenticals.jpg',         title: 'Tentacles' },
        ]
      },
      2023: {
        title:  'The Ink Sessions',
        desc:   'One drawing every week. The scroll begins. Fifty-two chances.',
        works:  [
          { src: '2023/blinded.jpg',   title: 'Blinded' },
          { src: '2023/Boredom.jpg',   title: 'Boredom' },
          { src: '2023/Call.jpg',      title: 'Call' },
          { src: '2023/chained.jpg',   title: 'Chained' },
          { src: '2023/Elephant.jpg',  title: 'Elephant' },
          { src: '2023/fall.jpg',      title: 'Fall' },
          { src: '2023/Fish.jpg',      title: 'Fish' },
          { src: '2023/Frog.jpg',      title: 'Frog' },
          { src: '2023/Funny.jpg',     title: 'Funny' },
          { src: '2023/Inflicting.jpg',title: 'Inflicting' },
          { src: '2023/Itch.jpg',      title: 'Itch' },
          { src: '2023/pineapple.jpg', title: 'Pineapple' },
          { src: '2023/Space-Dog.jpg', title: 'Space Dog' },
          { src: '2023/Stress.jpg',    title: 'Stress' },
        ]
      },
      2024: {
        title:  'Pressure & Release',
        desc:   'Tighter control meets deliberate chaos. Each piece a negotiation.',
        works:  [
          { src: '2024/Anne.jpg',               title: 'Anne' },
          { src: '2024/Butt-cheeks.jpg',        title: 'Butt Cheeks' },
          { src: '2024/experience.jpg',         title: 'Experience' },
          { src: '2024/Giraffe.jpg',            title: 'Giraffe' },
          { src: '2024/lion.jpg',               title: 'Lion' },
          { src: '2024/look-boy.jpg',           title: 'Look Boy' },
          { src: '2024/Love.jpg',               title: 'Love' },
          { src: '2024/Ramen.jpg',              title: 'Ramen' },
          { src: '2024/Relax and smile.jpg',    title: 'Relax and Smile' },
          { src: '2024/Rest.jpg',               title: 'Rest' },
          { src: '2024/space-boy.jpg',          title: 'Space Boy' },
          { src: '2024/The Chase.jpg',          title: 'The Chase' },
          { src: '2024/To See Different.jpg',   title: 'To See Different' },
        ]
      },
      2025: {
        title:  'Present Tense',
        desc:   'Ongoing. Unfinished. The year still drawing itself into existence.',
        works:  [
          { src: '2025/breeze.jpg',      title: 'Breeze' },
          { src: '2025/Brush.jpg',       title: 'Brush' },
          { src: '2025/candle.jpg',      title: 'Candle' },
          { src: '2025/chicken.jpg',     title: 'Chicken' },
          { src: '2025/cool-dog.jpg',    title: 'Cool Dog' },
          { src: '2025/Cow.jpg',         title: 'Cow' },
          { src: '2025/fish-person.jpg', title: 'Fish Person' },
          { src: '2025/RATS.jpg',        title: 'Rats' },
          { src: '2025/rider.jpg',       title: 'Rider' },
          { src: '2025/shoes.jpg',       title: 'Shoes' },
        ]
      }
    };

    /* ─── Runtime ─────────────────────────────────────────────── */
    const params   = new URLSearchParams(window.location.search);
    let   activeYr = parseInt(params.get('year')) || YEARS[YEARS.length - 1];
    if (!YEARS.includes(activeYr)) activeYr = YEARS[YEARS.length - 1];

    /* Build year strip */
    const strip = document.getElementById('yearStrip');
    YEARS.forEach(yr => {
      const a = document.createElement('a');
      a.className  = 'c-yr' + (yr === activeYr ? ' active' : '');
      a.textContent = yr;
      a.href = `?year=${yr}`;
      strip.appendChild(a);
    });

    /* Populate hero */
    const data = YEAR_DATA[activeYr] || {};
    document.getElementById('heroYear').textContent  = activeYr;
    document.getElementById('heroLabel').textContent = `Collection · ${activeYr}`;
    document.getElementById('heroTitle').textContent = data.title  || `Works of ${activeYr}`;
    document.getElementById('heroDesc').textContent  = data.desc   || '';
    document.getElementById('gridHeading').textContent = `${activeYr} Works`;
    document.title = `${activeYr} Collection — GuruDev`;

    /* Build grid */
    const grid   = document.getElementById('collectionGrid');
    const works  = data.works || [];

    if (works.length === 0) {
      /* Placeholder cards so the page looks populated */
      for (let i = 1; i <= 9; i++) {
        grid.appendChild(makeCard(
          `../Libs/projects/collections/${activeYr}/work-${String(i).padStart(2,'0')}.jpg`,
          `Work ${String(i).padStart(2,'0')}`,
          i
        ));
      }
    } else {
      works.forEach((w, i) => grid.appendChild(makeCard(w.src, w.title, i + 1)));
    }

    document.getElementById('gridCount').textContent =
      works.length > 0 ? `${works.length} works` : '';

    function makeCard(src, title, num) {
      const div = document.createElement('div');
      div.className = 'c-card';
      div.innerHTML = `
        <img src="${src}" alt="${title}"
             onerror="this.parentElement.classList.add('ph')" />
        <div class="c-card-ph-label">${src.split('/').pop()}</div>
        <div class="c-card-overlay">
          <span class="c-card-num">${String(num).padStart(2,'0')}</span>
          <span class="c-card-name">${title}</span>
        </div>
      `;
      return div;
    }
  </script>
</body>
</html>
